<!DOCTYPE html>
<html>
<head>
  <title>Project 4 Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: #4f6478;
      margin: 0;
      padding: 40px;
      color: #d554a4;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: #26384a;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 5px 18px rgba(0,0,0,0.35);
    }

    h1 {
      color: #c54f90;
      text-align: center;
      font-size: 40px;
      letter-spacing: 2px;
    }

    #status {
      color: #c54f90;
      text-align: center;
      margin-bottom: 20px;
    }

    .form-box {
      display: flex;
      gap: 10px;
      margin: 25px 0;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-family: 'Orbitron', sans-serif;
      background: #dbe5f0;
    }

    button {
      padding: 12px 18px;
      background: #c54f90;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Orbitron', sans-serif;
    }

    button:hover {
      background: #c54f90;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #34495e;
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 8px;
      color: #ff99ff;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #ff99ff;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Project 4 Dashboard</h1>

    <p id="status">Loading items...</p>

    <div class="form-box">
      <input id="itemInput" placeholder="Enter item name">
      <button onclick="addItem()">Add Item</button>
    </div>

    <ul id="itemList"></ul>

    <p class="footer">
      Express API connected through Render deployment
    </p>
  </div>

  <script src="dashboard_project.js"></script>
</body>
</html>
